<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 MBTI 검사</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card" id="start-screen">
    <h1 class="title">나만의 MBTI 검사</h1>
    <p class="subtitle">12개의 질문에 답하고 나의 성격 유형을 알아보세요.</p>
    <button class="btn" id="startBtn">테스트 시작하기</button>
  </main>

  <main class="card hidden" id="question-screen">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="progress-text" id="progressText">1 / 12</p>
    <h2 class="question-text" id="questionText"></h2>
    <div class="options" id="optionsContainer"></div>
  </main>

  <main class="card hidden" id="result-screen">
    <h2 class="title">당신의 MBTI는</h2>
    <p class="result-type" id="resultType"></p>
    <p class="result-description" id="resultDescription"></p>
    <div class="score-bars" id="scoreBars"></div>
    <button class="btn" id="restartBtn">다시하기</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
